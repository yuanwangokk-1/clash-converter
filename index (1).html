4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_MultiCountry.ini" },{ name: "ACL4SSR_Online_NoAuto.ini", url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_NoAuto.ini" },{ name: "ACL4SSR_Online_NoReject.ini", url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_NoReject.ini" },{ name: "ACL4SSR_WithChinaIp.ini", url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_WithChinaIp.ini" },{ name: "ACL4SSR_WithChinaIp_WithGFW.ini", url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_WithChinaIp_WithGFW.ini" },{ name: "ACL4SSR_WithGFW.ini", url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_WithGFW.ini" }
                ],
                v2ray: [
                    { name: "📡 V2Ray (无需规则)", url: "" },
                ]
            };
        
            function getAllPresets(type) {
                let base = configPresets[type] || [];
                if (!base.some(item => item.url === "custom")) {
                    base.push({ name: "🔧 自定义规则链接", url: "custom" });
                }
                return base;
            }
        
            function updateConfigOptions() {
                const targetType = el.target.value;
                let simpleType = targetType;
                if (targetType.startsWith('surge')) simpleType = 'surge';
                else if (targetType.startsWith('singbox')) simpleType = 'singbox';
        
                const presetList = getAllPresets(simpleType);
                const seen = new Set();
                const uniquePresets = presetList.filter(opt => {
                    if (seen.has(opt.url)) return false;
                    seen.add(opt.url);
                    return true;
                });
        
                el.config.innerHTML = uniquePresets.map(opt => `<option value="${opt.url}">${opt.name}</option>`).join('');
                el.configGroup.classList.toggle("hidden", el.config.value !== "custom");
            }
        
            el.target.addEventListener("change", updateConfigOptions);
        
            el.backend.addEventListener("change", () => {
                el.backendGroup.classList.toggle("hidden", el.backend.value !== "custom");
            });
        
            el.config.addEventListener("change", () => {
                el.configGroup.classList.toggle("hidden", el.config.value !== "custom");
            });
        
            el.btn.addEventListener("click", () => {
                const rawLines = el.input.value.trim().split('\n').filter(l => l.trim() !== '');
                if (rawLines.length === 0) return alert("请粘贴订阅链接");
        
                const rawUrl = rawLines.join('|');
                let backend = el.backend.value === "custom" ? el.customBackend.value.trim() : el.backend.value;
                if (!backend) return alert("后端地址不能为空");
                if (!backend.includes('?')) backend += '?';
        
                let config = el.config.value === "custom" ? el.customConfig.value.trim() : el.config.value;
                let finalUrl = `${backend}target=${encodeURIComponent(el.target.value)}&url=${encodeURIComponent(rawUrl)}`;
                
                if (config) {
                    finalUrl += `&config=${encodeURIComponent(config)}`;
                }
        
                if (el.target.value.includes('clash') || el.target.value === 'clash') {
                    finalUrl += `&emoji=true&list=false&udp=true&scv=true&new_name=true`;
                }
                if (el.target.value.includes('singbox')) {
                    finalUrl += `&emoji=true&scv=true&new_name=true`; 
                }
                if (el.target.value === 'quanx') {
                    finalUrl += `&emoji=true&scv=true`;
                }
        
                el.resultLink.href = finalUrl;
                el.resultLink.textContent = finalUrl;
                el.resultBox.classList.remove("hidden");
        
                navigator.clipboard.writeText(finalUrl).then(() => {
                    alert("✅ 转换链接已复制！");
                }).catch(() => {
                    alert("⚠️ 链接已生成，请手动复制。");
                });
            });
        
            updateConfigOptions();
            el.backendGroup.classList.add("hidden");
            if (el.config.value === "custom") el.configGroup.classList.remove("hidden");
        })();
    </script>
